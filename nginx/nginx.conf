events {}

http {

    # Upstream definitions
    upstream grafana_backend {
        server iam-grafana:3000;
    }

    upstream iam_api {
        server iam-api:5500;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name localhost;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;
        gzip_min_length 1000;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # API - Pass through to IAM API
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://iam_api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # JWKS Endpoint - Public key for JWT validation
        location /.well-known/jwks.json {
            proxy_pass http://iam_api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_cache_valid 200 1h;
        }

        # Grafana Dashboard
        # Grafana reads JWT directly from ?auth_token= query param (url_login=true)
        # No header injection needed!
        location /grafana/ {

        limit_req zone=grafana_limit burst=100 nodelay;

        proxy_pass http://grafana_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-JWT-Assertion $cookie_iam_access_token;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # React Frontend
        location / {
            proxy_pass http://iam-frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}